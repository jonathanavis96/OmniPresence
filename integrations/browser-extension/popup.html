<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniPresence Browser Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e2e;
      width: 320px;
      min-height: 200px;
    }

    header {
      background: #2a2a3d;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #383850;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #c9a7f5;
      letter-spacing: 0.02em;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-label {
      font-size: 11px;
      color: #aaa;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #555;
      border-radius: 18px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #7c5cbf; }
    input:checked + .slider:before { transform: translateX(14px); }

    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #2e2e42;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    #current-status {
      background: #252538;
      border-radius: 6px;
      padding: 8px 10px;
    }

    #current-domain {
      font-weight: 600;
      color: #c9a7f5;
      margin-bottom: 2px;
    }

    #current-category {
      color: #a0a0b8;
      font-size: 12px;
    }

    #whitelist-items {
      list-style: none;
      margin-top: 4px;
      max-height: 140px;
      overflow-y: auto;
    }

    #whitelist-items li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #2a2a3d;
    }

    #whitelist-items li:last-child { border-bottom: none; }

    .domain-name {
      color: #c0c0d8;
      font-size: 12px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #e05c5c;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #ff8080; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .add-row input {
      flex: 1;
      background: #252538;
      border: 1px solid #383850;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
    }

    .add-row input:focus { border-color: #7c5cbf; }

    .add-row button {
      background: #7c5cbf;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .add-row button:hover { background: #9370db; }

    .empty-state {
      color: #666;
      font-size: 11px;
      font-style: italic;
      padding: 4px 0;
    }

    footer {
      padding: 8px 14px;
      text-align: right;
    }

    footer a {
      color: #7c5cbf;
      text-decoration: none;
      font-size: 11px;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>OmniPresence Bridge</h1>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-state-label">On</span>
      <label class="switch">
        <input type="checkbox" id="master-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div class="section">
    <div class="section-title">Currently Reporting</div>
    <div id="current-status">
      <div id="current-domain">—</div>
      <div id="current-category">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Title Whitelist</div>
    <p style="font-size:11px; color:#888; margin-bottom:6px;">
      Domains below will include exact page titles in reports.
    </p>
    <ul id="whitelist-items">
      <li class="empty-state" id="empty-state">No domains whitelisted yet.</li>
    </ul>
    <div class="add-row">
      <input type="text" id="new-domain" placeholder="example.com" />
      <button id="add-domain-btn">Add</button>
    </div>
  </div>

  <footer>
    <a href="#" id="options-link">More options ›</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
